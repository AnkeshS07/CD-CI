name: Next.js CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect app directory
        id: detect
        shell: bash
        run: |
          if [ -f "nextjs-dummy/package.json" ]; then
            echo "app_dir=nextjs-dummy" >> "$GITHUB_OUTPUT"
          else
            echo "app_dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.app_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: npm ci

      - name: Run lint
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: npm run lint

      - name: Build app
        working-directory: ${{ steps.detect.outputs.app_dir }}
        run: npm run build